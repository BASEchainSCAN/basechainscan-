<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>BASEchainSCAN • Spotlight Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(255,255,255,0.04);
      --panel-2: rgba(255,255,255,0.06);
      --text: #EAF4FF;
      --muted: rgba(234,244,255,0.50);
      --muted-2: rgba(234,244,255,0.32);
      --brand: #14E6D4;
      --brand-2: #0052FF;
      --danger: #FF4757;
      --warn: #F59E0B;
      --font-main: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 0 0, rgba(20,230,212,0.10), transparent 32%),
        radial-gradient(circle at 100% 100%, rgba(0,82,255,0.11), transparent 30%),
        linear-gradient(180deg, #050816 0%, #080d1d 100%);
      color: var(--text);
      font-family: var(--font-main);
      padding: 26px 16px 40px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      opacity: 0.45;
    }

    button, input { font: inherit; }
    button { border: none; background: none; cursor: pointer; color: inherit; }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(100%, 720px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header,
    .panel {
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(13,19,36,0.96), rgba(7,11,24,0.96));
      box-shadow: 0 18px 36px rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .header-top {
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--brand-2) 30%, var(--brand) 60%, transparent 100%);
    }

    .header-body,
    .panel-body {
      padding: 16px;
    }

    .header-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 24px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: white;
    }

    .subtitle {
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.6;
      color: var(--muted);
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a,
    .btn,
    .filter-btn {
      border-radius: 14px;
      padding: 12px 14px;
      transition: transform 160ms ease, opacity 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .nav a {
      text-decoration: none;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      font-weight: 700;
      min-width: 140px;
    }

    .nav a.primary {
      color: var(--brand);
      border-color: rgba(20,230,212,0.18);
      background: rgba(20,230,212,0.08);
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(234,244,255,0.36);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(234,244,255,0.44);
    }

    .field input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 13px 14px;
      outline: none;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: rgba(234,244,255,0.78);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #050816;
      border-color: transparent;
    }

    .btn.danger {
      border-color: rgba(255,71,87,0.20);
      background: rgba(255,71,87,0.08);
      color: #FF8E98;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(234,244,255,0.40);
    }

    .filter-btn.active {
      background: rgba(255,255,255,0.08);
    }

    .notice {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.6;
      color: var(--muted);
    }

    .notice.error {
      border-color: rgba(255,71,87,0.18);
      background: rgba(255,71,87,0.08);
      color: #FF97A1;
    }

    .slots {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .slot {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .slot-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .slot-main {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }

    .slot-logo,
    .slot-logo-fallback {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      flex-shrink: 0;
    }

    .slot-logo {
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .slot-logo-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(20,230,212,0.08);
      border: 1px solid rgba(20,230,212,0.16);
      font-size: 20px;
    }

    .slot-title {
      font-size: 16px;
      font-weight: 800;
      color: white;
      line-height: 1.05;
    }

    .slot-subtitle {
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(234,244,255,0.36);
    }

    .status {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .status.pending {
      background: rgba(245,158,11,0.08);
      color: #FBBF24;
      border-color: rgba(245,158,11,0.20);
    }

    .status.approved {
      background: rgba(20,230,212,0.08);
      color: var(--brand);
      border-color: rgba(20,230,212,0.18);
    }

    .status.rejected {
      background: rgba(255,71,87,0.08);
      color: #FF8E98;
      border-color: rgba(255,71,87,0.18);
    }

    .slot-desc {
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.6;
      color: rgba(234,244,255,0.52);
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .meta-key {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(234,244,255,0.28);
    }

    .meta-value {
      margin-top: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.5;
      color: rgba(234,244,255,0.74);
      word-break: break-word;
    }

    .slot-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .slot-actions .btn {
      flex: 1 1 0;
      min-width: 120px;
    }

    .skeleton {
      height: 148px;
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 620px) {
      .slot-grid { grid-template-columns: 1fr; }
      .slot-top { flex-direction: column; }
      .status { align-self: flex-start; }
      .slot-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="header">
      <div class="header-top"></div>
      <div class="header-body">
        <div class="header-row">
          <div>
            <div class="eyebrow">Private Admin</div>
            <div class="title">Spotlight Admin</div>
            <div class="subtitle">Review submissions, verify payments and moderate Spotlight requests.</div>
          </div>
          <div class="nav">
            <a href="/spotlight">Open Spotlight</a>
            <a class="primary" href="/">Back To Terminal</a>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-body" style="display:flex; flex-direction:column; gap:14px;">
        <div class="field">
          <label for="admin-token">Admin password</label>
          <input id="admin-token" type="password" placeholder="Enter Spotlight admin password" autocomplete="off" />
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn primary" id="load-btn" type="button">Load submissions</button>
          <button class="btn" id="save-token-btn" type="button">Save in session</button>
          <button class="btn danger" id="clear-token-btn" type="button">Clear token</button>
        </div>
        <div class="filter-bar" id="filter-bar"></div>
        <div id="admin-notice" class="notice">Enter your admin password to load Spotlight submissions and payment checks.</div>
        <div id="slots" class="slots"></div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      token: sessionStorage.getItem('spotlight-admin-token') || '',
      filter: 'pending',
      loading: false,
      slots: [],
      error: ''
    };

    const filters = ['pending', 'approved', 'rejected', 'all'];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function shortHash(value, left = 8, right = 6) {
      if (!value || value.length <= left + right) return value || '';
      return value.slice(0, left) + '...' + value.slice(-right);
    }

    function formatSlotDay(day) {
      return new Date(day * 86400000).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function openExternal(url) {
      if (!url) return;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function setNotice(message, isError = false) {
      const el = document.getElementById('admin-notice');
      el.className = isError ? 'notice error' : 'notice';
      el.innerHTML = escapeHtml(message);
    }

    function renderFilters() {
      const counts = {
        pending: state.slots.filter((slot) => slot.status === 'pending').length,
        approved: state.slots.filter((slot) => slot.status === 'approved').length,
        rejected: state.slots.filter((slot) => slot.status === 'rejected').length,
        all: state.slots.length
      };

      const labels = {
        pending: `Pending (${counts.pending})`,
        approved: `Approved (${counts.approved})`,
        rejected: `Rejected (${counts.rejected})`,
        all: `All (${counts.all})`
      };

      document.getElementById('filter-bar').innerHTML = filters.map((filter) => `
        <button
          type="button"
          class="filter-btn ${state.filter === filter ? 'active' : ''}"
          data-filter="${filter}"
        >${escapeHtml(labels[filter])}</button>
      `).join('');
    }

    function renderSlots() {
      renderFilters();
      const shell = document.getElementById('slots');

      if (state.loading) {
        shell.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
        return;
      }

      const visible = state.filter === 'all'
        ? state.slots
        : state.slots.filter((slot) => slot.status === state.filter);

      if (!visible.length) {
        shell.innerHTML = '<div class="notice">No Spotlight submissions match the current filter.</div>';
        return;
      }

      shell.innerHTML = visible.map((slot) => {
        const logo = slot.project_logo_url
          ? `<img class="slot-logo" src="${escapeHtml(slot.project_logo_url)}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';" /><div class="slot-logo-fallback" style="display:none;">📡</div>`
          : '<div class="slot-logo-fallback">📡</div>';
        const verification = slot.verification;
        const verificationNotice = verification
          ? `<div class="notice ${verification.ok ? '' : 'error'}">${
              escapeHtml(verification.ok
                ? (verification.reason || 'Payment verified on Base.')
                : (verification.reason || 'Payment verification failed.'))
            }</div>`
          : '';

        return `
          <article class="slot">
            <div class="slot-top">
              <div class="slot-main">
                ${logo}
                <div>
                  <div class="slot-title">${escapeHtml(slot.project_name)}</div>
                  <div class="slot-subtitle">${escapeHtml(formatSlotDay(slot.slot_day))} · ${escapeHtml(slot.slot_date)}</div>
                </div>
              </div>
              <div class="status ${escapeHtml(slot.status)}">${escapeHtml(slot.status)}</div>
            </div>

            <div class="slot-desc">${escapeHtml(slot.project_description)}</div>

            ${verificationNotice}

            <div class="slot-grid">
              <div class="meta">
                <div class="meta-key">Submitter</div>
                <div class="meta-value">${escapeHtml(slot.submitter_address ? shortHash(slot.submitter_address) : '—')}</div>
              </div>
              <div class="meta">
                <div class="meta-key">Tx hash</div>
                <div class="meta-value">${slot.tx_hash ? `<a href="#" data-open-url="https://basescan.org/tx/${escapeHtml(slot.tx_hash)}">${escapeHtml(shortHash(slot.tx_hash))} ↗</a>` : '—'}</div>
              </div>
              <div class="meta">
                <div class="meta-key">Created</div>
                <div class="meta-value">${escapeHtml(new Date(slot.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }))}</div>
              </div>
              <div class="meta">
                <div class="meta-key">Approved</div>
                <div class="meta-value">${escapeHtml(slot.approved_at ? new Date(slot.approved_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—')}</div>
              </div>
            </div>

            <div class="slot-actions">
              <button class="btn" type="button" data-open-url="${escapeHtml(slot.project_url)}">Visit project</button>
              ${slot.x_url ? `<button class="btn" type="button" data-open-url="${escapeHtml(slot.x_url)}">Open X</button>` : ''}
              ${slot.token_address ? `<button class="btn" type="button" data-open-url="${escapeHtml(`https://dexscreener.com/base/${slot.token_address}`)}">Open Dex</button>` : ''}
              ${slot.status === 'pending'
                ? `<button class="btn danger" type="button" data-action="reject" data-id="${escapeHtml(slot.id)}">Reject</button>
                   <button class="btn primary" type="button" data-action="approve" data-id="${escapeHtml(slot.id)}">Approve</button>`
                : slot.status === 'approved'
                  ? `<button class="btn danger" type="button" data-action="reject" data-id="${escapeHtml(slot.id)}">Revoke</button>`
                  : `<button class="btn primary" type="button" data-action="approve" data-id="${escapeHtml(slot.id)}">Re-approve</button>`
              }
            </div>
          </article>
        `;
      }).join('');
    }

    async function loadSlots() {
      const token = state.token.trim();
      if (!token) {
        setNotice('Admin password is required to load Spotlight submissions.', true);
        return;
      }

      state.loading = true;
      renderSlots();
      setNotice('Loading Spotlight submissions...');

      try {
        const res = await fetch('/api/spotlight/admin?withVerification=1', {
          headers: { 'x-admin-token': token }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        state.slots = data.slots || [];
        setNotice(`Loaded ${state.slots.length} Spotlight submission(s).`);
      } catch (error) {
        state.slots = [];
        setNotice(error instanceof Error ? error.message : 'Failed to load Spotlight submissions.', true);
      } finally {
        state.loading = false;
        renderSlots();
      }
    }

    async function mutateSlot(id, action) {
      const token = state.token.trim();
      if (!token) {
        setNotice('Admin password is required to moderate Spotlight submissions.', true);
        return;
      }

      setNotice(`${action === 'approve' ? 'Approving' : 'Rejecting'} Spotlight submission...`);

      try {
        const res = await fetch('/api/spotlight/admin', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-token': token
          },
          body: JSON.stringify({ id, action })
        });
        const data = await res.json();
        if (!res.ok) {
          const detail = data?.verification?.reason ? `: ${data.verification.reason}` : '';
          throw new Error((data.error || `HTTP ${res.status}`) + detail);
        }
        setNotice(`Spotlight submission ${action === 'approve' ? 'approved' : 'rejected'} successfully.`);
        await loadSlots();
      } catch (error) {
        setNotice(error instanceof Error ? error.message : 'Failed to update Spotlight submission.', true);
      }
    }

    document.addEventListener('click', (event) => {
      const openUrl = event.target.closest('[data-open-url]');
      if (openUrl) {
        event.preventDefault();
        openExternal(openUrl.dataset.openUrl);
        return;
      }

      const filterBtn = event.target.closest('[data-filter]');
      if (filterBtn) {
        state.filter = filterBtn.dataset.filter;
        renderSlots();
        return;
      }

      const actionBtn = event.target.closest('[data-action]');
      if (!actionBtn) return;
      const action = actionBtn.dataset.action;
      const id = actionBtn.dataset.id;
      if (action && id) {
        mutateSlot(id, action);
      }
    });

    document.getElementById('admin-token').value = state.token;
    document.getElementById('admin-token').addEventListener('input', (event) => {
      state.token = event.target.value;
    });

    document.getElementById('load-btn').addEventListener('click', loadSlots);
    document.getElementById('save-token-btn').addEventListener('click', () => {
      sessionStorage.setItem('spotlight-admin-token', state.token);
      setNotice('Admin password saved in this browser session.');
    });
    document.getElementById('clear-token-btn').addEventListener('click', () => {
      state.token = '';
      document.getElementById('admin-token').value = '';
      sessionStorage.removeItem('spotlight-admin-token');
      setNotice('Admin password cleared.');
    });

    renderSlots();
  </script>
</body>
</html>
