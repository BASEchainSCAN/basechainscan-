<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base:app_id" content="69d6f153adb751d63e3ce647">
  <title>BasechainSCAN • Terminal</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0f1c;
      color: #e0f7ff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 760px;
      padding: 40px 20px;
    }
    .logo {
      font-size: 4.8rem;
      font-weight: 800;
      letter-spacing: -3px;
      background: linear-gradient(90deg, #00f5ff, #00d4c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 1.35rem;
      opacity: 0.85;
      margin-bottom: 60px;
    }
    .description {
      font-size: 1.15rem;
      opacity: 0.75;
      max-width: 560px;
      margin: 0 auto 50px;
    }
    .newsletter {
      max-width: 420px;
      margin: 0 auto 70px;
    }
    input {
      width: 100%;
      padding: 18px 20px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #e0f7ff;
      font-size: 1.1rem;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 18px;
      background: #00d4c8;
      color: #0a0f1c;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.15rem;
      cursor: pointer;
    }
    .beta {
      margin-top: 40px;
      padding: 16px 40px;
      background: transparent;
      color: #64748b;
      border: 1.5px solid #64748b;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: not-allowed;
    }
    .x-link {
      color: #00f5ff;
      text-decoration: none;
      margin-top: 80px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BasechainSCAN</div>
    <p class="subtitle">A Telegram Terminal for Base</p>
    <p class="description">
      Discovery. Smart signals. Onchain intelligence.<br>
      Built for operators who filter noise and hunt edge.
    </p>

    <!-- Newsletter -->
    <div class="newsletter">
      <p style="margin-bottom: 16px; opacity: 0.9;">Stay updated with quiet progress and early signals</p>
      <input type="email" placeholder="your@email.com" id="email">
      <button onclick="subscribe()">Subscribe to Updates</button>
    </div>

    <!-- Early Beta -->
    <button class="beta" disabled>
      Early Beta Testing — Coming Soon
    </button>

    <a href="https://x.com/BASEchainSCAN" target="_blank" class="x-link">
      Follow our radar on X →
    </a>
  </div>

  <script>
    function subscribe() {
      const email = document.getElementById('email').value.trim();
      if (email === '') {
        alert("Please enter your email");
        return;
      }
      alert("Thank you! You'll receive updates soon.\n\n(This is a demo — no emails are collected yet.)");
      document.getElementById('email').value = '';
    }
  </script>
</body>
</html>
