<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base:app_id" content="69d6f153adb751d63e3ce647">
  <title>BasechainSCAN • Terminal</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0f1c;
      color: #e0f7ff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      max-width: 720px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 4.2rem;
      font-weight: 700;
      margin: 0 0 16px 0;
      background: linear-gradient(90deg, #00f5ff, #00d4c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }
    .tagline {
      font-size: 1.45rem;
      opacity: 0.9;
      margin-bottom: 40px;
      line-height: 1.4;
    }
    .description {
      font-size: 1.15rem;
      opacity: 0.75;
      max-width: 580px;
      margin: 0 auto 50px;
    }
    .x-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #00f5ff;
      text-decoration: none;
      font-size: 1.1rem;
      opacity: 0.85;
      margin-top: 30px;
      transition: opacity 0.2s;
    }
    .x-link:hover {
      opacity: 1;
    }
    .status {
      font-size: 1rem;
      opacity: 0.55;
      margin-top: 60px;
    }
    .glow {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 620px;
      height: 620px;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <h1>BasechainSCAN</h1>
    <p class="tagline">A Telegram Terminal for Base</p>
    <p class="description">
      Discovery. Smart signals. Onchain intelligence.<br>
      Built for operators who filter noise and hunt edge.
    </p>
    
    <a href="https://x.com/BASEchainSCAN" target="_blank" class="x-link">
      Follow our radar on X →
    </a>

    <p class="status">Building quietly • Coming soon</p>
  </div>
</body>
</html>
